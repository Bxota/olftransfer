services:
  app:
    build:
      context: ..
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: olftransfer
      S3_LOGS_BUCKET: olftransfer-logs
      BASE_URL: http://localhost:8000
      APP_SECRET: ${APP_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    entrypoint: []
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - internal
    depends_on:
      - postgres
      - minio

  postgres:
    environment:
      POSTGRES_DB: olftransfer
      POSTGRES_USER: olftransfer
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../infra/roles/postgres/files/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  minio:
    image: minio/minio
    container_name: olftransfer-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - internal
      - devnet

  createbuckets:
    image: minio/mc
    networks:
      - internal
      - devnet
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/olftransfer;
      mc anonymous set download local/olftransfer;
      mc mb --ignore-existing local/olftransfer-logs;
      echo '2024-01-15T10:23:45Z olftransfer [GET] /abc123/photo.jpg 200 1234567 - Mozilla/5.0' | mc pipe local/olftransfer-logs/2024-01-15-10-access.log;
      echo '2024-01-15T11:05:12Z olftransfer [PUT] /def456/document.pdf 200 9876543 - aws-sdk/3.0' | mc pipe local/olftransfer-logs/2024-01-15-11-access.log;
      exit 0;
      "

volumes:
  miniodata:

networks:
  devnet:
    driver: bridge
  caddy_net:
    external: false
    driver: bridge
