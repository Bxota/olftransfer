services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-bxota/olftransfer}:${IMAGE_TAG:-latest}
    container_name: olftransfer-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ENDPOINT: ${S3_ENDPOINT}
      APP_SECRET: ${APP_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    networks:
      caddy_net:
        aliases:
          - olftransfer_app
      internal:
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: olftransfer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: olftransfer
      POSTGRES_USER: olftransfer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  pgdata:

networks:
  caddy_net:
    name: caddy_net
    external: true
  internal:
    internal: true
