services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-bxota/olftransfer}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      APP_SECRET: ${APP_SECRET}
    networks:
      caddy_net:
        aliases:
          - olftransfer_app
      internal:
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: olftransfer
      POSTGRES_USER: olftransfer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  pgdata:

networks:
  caddy_net:
    name: caddy_net
    external: true
  internal:
    internal: true
