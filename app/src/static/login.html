<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OlfTransfer — Connexion</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <span class="logo-name">OlfTransfer</span>
      </div>

      <h1 class="login-title">Connexion</h1>
      <p class="login-sub">Bienvenue. Connecte-toi pour envoyer des fichiers.</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="toi@exemple.com" autofocus autocomplete="email">
        </div>
        <div class="field mt-3">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <div id="error" class="alert alert-error mt-3 hidden"></div>

        <button type="submit" class="btn btn-primary btn-full mt-4" id="submitBtn">
          Se connecter
        </button>
      </form>

    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('error');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Connexion…';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = (await res.json()).detail;
          err.classList.remove('hidden');
        }
      } catch {
        err.textContent = 'Erreur réseau.';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
