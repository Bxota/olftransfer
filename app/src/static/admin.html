<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OlfTransfer — Admin</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <header class="header">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <span class="logo-name">OlfTransfer</span>
    </a>
    <div class="header-actions">
      <a href="/" class="btn btn-ghost btn-sm">Retour</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Déconnexion</button>
    </div>
  </header>

  <main class="page">
    <div class="page-narrow">

      <!-- Statistiques -->
      <div class="card">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <p class="section-label" style="margin:0">Statistiques</p>
            <button class="btn btn-ghost btn-sm" id="refreshStatsBtn">Actualiser</button>
          </div>
          <div id="statsContent">
            <p class="text-subtext" style="padding:8px 0;font-size:.875rem">Chargement…</p>
          </div>
        </div>
      </div>

      <!-- Inviter un utilisateur -->
      <div class="card">
        <div class="card-body">
          <p class="section-label">Inviter un utilisateur</p>
          <form id="inviteForm">
            <div class="field">
              <label for="email">Adresse email</label>
              <input type="email" id="email" placeholder="ami@exemple.com" autofocus>
            </div>
            <div id="invite-error" class="alert alert-error mt-3 hidden"></div>
            <div id="invite-success" class="hidden mt-3">
              <div class="alert alert-success" id="invite-success-msg"></div>
              <div class="share-box mt-3" id="invite-link-box" style="display:none">
                <span class="share-link" id="invite-link"></span>
                <button class="copy-btn" id="invite-copy">Copier</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full mt-4" id="inviteBtn">
              Envoyer l'invitation
            </button>
          </form>
        </div>
      </div>

      <!-- Liste des utilisateurs -->
      <div class="card mt-4">
        <div class="card-body">
          <p class="section-label">Utilisateurs</p>
          <ul class="file-list" id="userList">
            <li class="text-subtext" style="padding:12px 0">Chargement…</li>
          </ul>
        </div>
      </div>

      <!-- Access Logs OVH -->
      <div class="card mt-4">
        <div class="card-body">
          <p class="section-label">Access Logs OVH</p>
          <div id="logs-unavailable" class="hidden">
            <p class="text-subtext" style="padding:12px 0;font-size:.875rem">
              Variable <code>S3_LOGS_BUCKET</code> non configurée.
            </p>
          </div>
          <ul class="file-list" id="logList">
            <li class="text-subtext" style="padding:12px 0">Chargement…</li>
          </ul>
        </div>
      </div>

      <!-- Contenu d'un log -->
      <div class="card mt-4 hidden" id="logViewerCard">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <p class="section-label" style="margin:0" id="logViewerTitle">Log</p>
            <button class="btn btn-ghost btn-sm" id="closeLogBtn">Fermer</button>
          </div>
          <pre id="logContent" style="font-size:.75rem;overflow-x:auto;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:400px;overflow-y:auto">Chargement…</pre>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Vérifier que l'utilisateur est admin
    fetch('/auth/me').then(r => {
      if (!r.ok) { window.location.href = '/login'; return; }
      return r.json();
    }).then(user => {
      if (user && !user.is_admin) window.location.href = '/';
    });

    // Statistiques
    function formatBytes(b) {
      if (b === null || b === undefined) return '—';
      if (b === 0) return '0 o';
      const u = ['o','Ko','Mo','Go','To'];
      const i = Math.floor(Math.log(b) / Math.log(1024));
      return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
    }

    function kpiCard(label, value, sub) {
      return `<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px">
        <div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--subtext);margin-bottom:6px">${label}</div>
        <div style="font-size:22px;font-weight:700;color:var(--text)">${value}</div>
        ${sub ? `<div style="font-size:12px;color:var(--subtext);margin-top:2px">${sub}</div>` : ''}
      </div>`;
    }

    function renderStats(s) {
      const s3Ok = s.s3.total_bytes !== null;
      const phantomLabel = s.phantom_bytes > 0
        ? `<span style="color:#F59E0B">${formatBytes(s.phantom_bytes)}</span>`
        : `<span style="color:var(--success)">Aucun</span>`;

      const lastUpload = s.s3.last_upload
        ? new Date(s.s3.last_upload).toLocaleString('fr-FR')
        : '—';

      const grid = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px">
          ${kpiCard('Storage S3 réel', s3Ok ? formatBytes(s.s3.total_bytes) : '—', s3Ok ? `${s.s3.object_count} objet${s.s3.object_count > 1 ? 's' : ''}` : 'Erreur S3')}
          ${kpiCard('Storage actif (DB)', formatBytes(s.db.active_bytes), 'fichiers non purgés')}
          ${kpiCard('Transfers actifs', s.db.active_transfers, `sur ${s.db.total_transfers} au total`)}
          ${kpiCard('Téléchargements', s.db.total_downloads, 'toutes périodes')}
          ${kpiCard('Objets fantômes', s3Ok ? phantomLabel : '—', 'S3 − DB active')}
          ${kpiCard('Dernier upload S3', s3Ok ? `<span style="font-size:13px">${lastUpload}</span>` : '—', '')}
        </div>`;

      const tableRows = s.users.map(u => `
        <tr>
          <td style="padding:8px 6px;font-size:.875rem">${escHtml(u.email)}</td>
          <td style="padding:8px 6px;font-size:.875rem;text-align:right">${formatBytes(u.active_bytes)}</td>
          <td style="padding:8px 6px;font-size:.875rem;text-align:right">${u.active_transfers} / ${u.total_transfers}</td>
          <td style="padding:8px 6px;font-size:.875rem;text-align:right">${u.downloads}</td>
        </tr>`).join('');

      const table = `
        <p class="section-label" style="margin-bottom:8px">Par utilisateur</p>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="border-bottom:1px solid var(--border)">
                <th style="padding:6px;font-size:11px;font-weight:600;text-align:left;color:var(--subtext)">Utilisateur</th>
                <th style="padding:6px;font-size:11px;font-weight:600;text-align:right;color:var(--subtext)">Stockage actif</th>
                <th style="padding:6px;font-size:11px;font-weight:600;text-align:right;color:var(--subtext)">Actifs / Total</th>
                <th style="padding:6px;font-size:11px;font-weight:600;text-align:right;color:var(--subtext)">DL</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>`;

      const cacheNote = s.s3.from_cache
        ? '<p style="font-size:.75rem;color:var(--subtext);margin-top:12px">Données S3 depuis le cache (TTL 5 min). Cliquer sur Actualiser pour forcer.</p>'
        : '';

      document.getElementById('statsContent').innerHTML = grid + table + cacheNote;
    }

    async function loadStats(refresh = false) {
      const res = await fetch('/admin/stats' + (refresh ? '?refresh=true' : ''));
      if (!res.ok) {
        document.getElementById('statsContent').innerHTML = '<p class="text-subtext" style="font-size:.875rem">Erreur lors du chargement des statistiques.</p>';
        return;
      }
      renderStats(await res.json());
    }

    loadStats();

    document.getElementById('refreshStatsBtn').addEventListener('click', () => {
      document.getElementById('statsContent').innerHTML = '<p class="text-subtext" style="padding:8px 0;font-size:.875rem">Chargement…</p>';
      loadStats(true);
    });

    // Charger les utilisateurs
    async function loadUsers() {
      const res = await fetch('/admin/users');
      if (!res.ok) return;
      const users = await res.json();
      const list = document.getElementById('userList');
      list.innerHTML = users.map(u => `
        <li class="file-item">
          <div class="file-type-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="file-info">
            <div class="file-name">${u.email}</div>
            <div class="file-size">${u.is_admin ? 'Admin · ' : ''}Membre depuis ${new Date(u.created_at).toLocaleDateString('fr-FR')}</div>
          </div>
        </li>
      `).join('');
    }

    loadUsers();

    // Formulaire invitation
    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('inviteBtn');
      const err = document.getElementById('invite-error');
      const success = document.getElementById('invite-success');
      err.classList.add('hidden');
      success.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Envoi…';

      try {
        const res = await fetch('/admin/invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        const data = await res.json();

        if (res.ok) {
          const msg = document.getElementById('invite-success-msg');
          const linkBox = document.getElementById('invite-link-box');
          const linkEl = document.getElementById('invite-link');

          if (data.smtp_error) {
            msg.textContent = `Email non envoyé (SMTP non configuré). Partage ce lien manuellement :`;
            linkBox.style.display = 'flex';
            linkEl.textContent = data.invite_url;
          } else {
            msg.textContent = `Invitation envoyée à ${document.getElementById('email').value} !`;
            linkBox.style.display = 'none';
          }
          success.classList.remove('hidden');
          document.getElementById('email').value = '';
          loadUsers();
        } else {
          err.textContent = data.detail;
          err.classList.remove('hidden');
        }
      } catch {
        err.textContent = 'Erreur réseau.';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = "Envoyer l'invitation";
      }
    });

    // Copier le lien
    document.getElementById('invite-copy').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('invite-link').textContent).then(() => {
        const btn = document.getElementById('invite-copy');
        btn.textContent = 'Copié !';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    // Access Logs
    async function loadLogs() {
      const res = await fetch('/admin/logs');
      const list = document.getElementById('logList');
      if (res.status === 503) {
        list.innerHTML = '';
        document.getElementById('logs-unavailable').classList.remove('hidden');
        return;
      }
      if (!res.ok) {
        list.innerHTML = '<li class="text-subtext" style="padding:12px 0;font-size:.875rem">Erreur lors du chargement.</li>';
        return;
      }
      const logs = await res.json();
      if (logs.length === 0) {
        list.innerHTML = '<li class="text-subtext" style="padding:12px 0;font-size:.875rem">Aucun fichier de log.</li>';
        return;
      }
      list.innerHTML = logs.map(l => {
        const name = l.key.split('/').pop();
        const date = new Date(l.last_modified).toLocaleString('fr-FR');
        const size = l.size < 1024 ? `${l.size} o` : `${(l.size / 1024).toFixed(1)} Ko`;
        return `
          <li class="file-item" style="cursor:pointer" data-key="${escHtml(l.key)}">
            <div class="file-type-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
            </div>
            <div class="file-info">
              <div class="file-name">${escHtml(name)}</div>
              <div class="file-size">${date} · ${size}</div>
            </div>
          </li>`;
      }).join('');

      list.querySelectorAll('[data-key]').forEach(el => {
        el.addEventListener('click', () => openLog(el.dataset.key));
      });
    }

    async function openLog(key) {
      const card = document.getElementById('logViewerCard');
      const pre = document.getElementById('logContent');
      const title = document.getElementById('logViewerTitle');
      title.textContent = key.split('/').pop();
      pre.textContent = 'Chargement…';
      card.classList.remove('hidden');
      card.scrollIntoView({ behavior: 'smooth' });

      const res = await fetch(`/admin/logs/content?key=${encodeURIComponent(key)}`);
      if (!res.ok) {
        pre.textContent = 'Erreur lors du chargement du fichier.';
        return;
      }
      const data = await res.json();
      pre.textContent = data.content || '(fichier vide)';
    }

    document.getElementById('closeLogBtn').addEventListener('click', () => {
      document.getElementById('logViewerCard').classList.add('hidden');
    });

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadLogs();
  </script>
</body>
</html>
