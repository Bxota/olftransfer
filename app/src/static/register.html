<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OlfTransfer — Créer mon compte</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <span class="logo-name">OlfTransfer</span>
      </div>

      <!-- Chargement -->
      <div id="state-loading" class="text-center text-subtext">Vérification de l'invitation…</div>

      <!-- Invitation invalide -->
      <div id="state-invalid" class="hidden">
        <div class="alert alert-error">Cette invitation est invalide ou a expiré.</div>
      </div>

      <!-- Formulaire -->
      <div id="state-form" class="hidden">
        <h1 class="login-title">Créer mon compte</h1>
        <p class="login-sub">Invitation pour <strong id="invite-email"></strong></p>

        <form id="registerForm">
          <div class="field">
            <label for="password">Choisir un mot de passe</label>
            <input type="password" id="password" placeholder="8 caractères minimum" autofocus autocomplete="new-password">
          </div>
          <div class="field mt-3">
            <label for="password2">Confirmer le mot de passe</label>
            <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password">
          </div>

          <div id="error" class="alert alert-error mt-3 hidden"></div>

          <button type="submit" class="btn btn-primary btn-full mt-4" id="submitBtn">
            Créer mon compte
          </button>
        </form>
      </div>

    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function init() {
      if (!token) { showInvalid(); return; }
      try {
        const res = await fetch(`/admin/invite/${token}`);
        if (!res.ok) { showInvalid(); return; }
        const { email } = await res.json();
        document.getElementById('invite-email').textContent = email;
        document.getElementById('state-loading').classList.add('hidden');
        document.getElementById('state-form').classList.remove('hidden');
      } catch { showInvalid(); }
    }

    function showInvalid() {
      document.getElementById('state-loading').classList.add('hidden');
      document.getElementById('state-invalid').classList.remove('hidden');
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('error');
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      err.classList.add('hidden');

      if (password !== password2) {
        err.textContent = 'Les mots de passe ne correspondent pas.';
        err.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Création…';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = (await res.json()).detail;
          err.classList.remove('hidden');
        }
      } catch {
        err.textContent = 'Erreur réseau.';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      }
    });

    init();
  </script>
</body>
</html>
