---
- name: Ensure app directory exists
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: "0755"

- name: Create postgres data directory
  file:
    path: "{{ app_dir }}/pgdata"
    state: directory
    mode: "0700"

- name: Copy migration SQL
  copy:
    src: schema.sql
    dest: "{{ app_dir }}/schema.sql"
    mode: "0644"
