---
- name: Install Doppler CLI
  shell: |
    curl -Ls --tlsv1.2 --proto "=https" --retry 3 \
      https://cli.doppler.com/install.sh | sh
  args:
    creates: /usr/local/bin/doppler

- name: Copy docker-compose.yml
  copy:
    src: "{{ playbook_dir }}/../app/docker-compose.yml"
    dest: "{{ app_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start containers
  shell: >
    doppler run
    --token {{ doppler_token }}
    --project olftransfer
    --config prd
    -- docker compose -f {{ app_dir }}/docker-compose.yml up -d --pull always
  environment:
    IMAGE_TAG: "{{ image_tag }}"
    GITHUB_REPOSITORY: "bxota/olftransfer"

- name: Wait for PostgreSQL to be ready
  shell: >
    docker exec olftransfer-postgres
    pg_isready -U olftransfer
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0

- name: Run migrations
  shell: >
    docker exec -i olftransfer-postgres
    psql -U olftransfer -d olftransfer
    < {{ app_dir }}/schema.sql
